# Taken from: https://docs.github.com/en/actions/publishing-packages/publishing-docker-images#publishing-images-to-github-packages

name: GitHub Container Registery Deployment

on:
  # Runs the workflow every time a new tag (version) is created
  push:
    tags:
      - '*'
  # Allows the workflow to be manually dispatched
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: CAJ654/Simulations

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the GitHub Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Generate Tag Version
        shell: bash
        run: |
          export RELEASE_VER=`sed 's/sleekfolio-v//g' <(echo ${{ github.ref_name }})`
          export COMMIT_ID=`git log -n1 --format="%h"`
          echo "version: ${RELEASE_VER}"
          echo "commit: ${COMMIT_ID}"
          echo "RELEASE_VER=${RELEASE_VER}" >> "$GITHUB_ENV"
          echo "COMMIT_ID=${COMMIT_ID}" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            RELEASE_VER=${{ env.RELEASE_VER }}
            COMMIT_ID=${{ env.COMMIT_ID }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
